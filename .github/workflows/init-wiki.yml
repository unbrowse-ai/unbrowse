name: Init Wiki
on:
  workflow_dispatch:
jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Create wiki
        env:
          GH_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          mkdir -p wiki && cd wiki && git init
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/unbrowse-ai/unbrowse.wiki.git
          echo "# Unbrowse" > Home.md
          git config user.name "lekt9"
          git config user.email "lewis@getfoundry.app"
          git add -A && git commit -m "Initialize wiki"
          git push -u origin master
