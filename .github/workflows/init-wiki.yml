name: Init Wiki
on:
  workflow_dispatch:
jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Create wiki
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p wiki
          cd wiki
          git init
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/unbrowse-ai/unbrowse.wiki.git
          echo "# Unbrowse" > Home.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initialize wiki"
          git push -u origin master
